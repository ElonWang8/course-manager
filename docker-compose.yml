services:
  app:
    image: ghcr.io/elonwang8/course-manager:latest
    build: .
    ports:
      - "3721:8000"
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - JWT_SECRET=${JWT_SECRET:-change-me-to-random-string}
      - TZ=Asia/Shanghai
    volumes:
      - ./backend/data:/app/data
      - /etc/localtime:/etc/localtime:ro
